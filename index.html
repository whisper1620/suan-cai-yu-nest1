<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酸菜鱼的小窝</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family: "Microsoft YaHei",sans-serif;}
        body{background:#f9f9f9;color:#333;}
        header{background:#ff9ebb;color:white;text-align:center;padding:30px 20px;}
        .container{max-width:1000px;margin:30px auto;padding:0 20px;}
        .menu{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:40px;}
        .item{background:white;padding:25px;border-radius:15px;text-align:center;box-shadow:0 2px 10px #00000010;cursor:pointer;}
        .item h3{margin:10px 0;}
        .box{display:none;margin-top:20px;}
        .active{display:block !important;}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px;}
        img, video{width:100%;border-radius:10px;object-fit:cover;}
        video{height:200px;}
    </style>
</head>
<body>

<header>
    <h1>酸菜鱼的小窝</h1>
    <p>我的图片、视频、文件存储空间</p>
</header>

<div class="container">
    <div class="menu">
        <div class="item" onclick="show('pic')">
            <h2>🖼️</h2>
            <h3>图片相册</h3>
        </div>
        <div class="item" onclick="show('video')">
            <h2>🎬</h2>
            <h3>视频专区</h3>
        </div>
        <div class="item" onclick="show('file')">
            <h2>📁</h2>
            <h3>文件仓库</h3>
        </div>
    </div>

    <!-- 图片会显示在这里 -->
    <div id="pic" class="box active">
        <div class="grid">
            <img src="1.jpg">
            <img src="2.jpg">
            <img src="3.jpg">
            <img src="4.jpg">
        </div>
    </div>

    <!-- 视频会播放在这里 -->
    <div id="video" class="box">
        <div class="grid">
            <video controls src="1.mp4"></video>
            <video controls src="2.mp4"></video>
        </div>
    </div>

    <!-- 文件下载 -->
    <div id="file" class="box">
        <ul style="line-height:2.5;font-size:16px;">
            <li><a href="课件.pdf" download>📄 课件.pdf</a></li>
            <li><a href="笔记.docx" download>📄 笔记.docx</a></li>
        </ul>
    </div>
</div>

<script>
    function show(id){
        document.querySelectorAll('.box').forEach(i=>i.classList.remove('active'))
        document.getElementById(id).classList.add('active')
    }
</script>

</body>
</html>
